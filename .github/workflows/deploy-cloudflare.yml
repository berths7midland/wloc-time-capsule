name: Deploy WLOC to Cloudflare

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wloc-cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install locked dependencies
        run: npm ci

      - name: Release gate
        run: npm run verify

      - name: Check deployment credentials
        run: |
          token="${CLOUDFLARE_API_TOKEN:-$CF_API_TOKEN}"
          account="${CLOUDFLARE_ACCOUNT_ID:-$CF_ACCOUNT_ID}"
          if [ -n "$token" ] && [ -n "$account" ]; then
            echo "CLOUDFLARE_API_TOKEN=$token" >> "$GITHUB_ENV"
            echo "CLOUDFLARE_ACCOUNT_ID=$account" >> "$GITHUB_ENV"
            echo "DEPLOY_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_ENABLED=false" >> "$GITHUB_ENV"
            echo "::notice::Cloudflare deployment skipped because repository deployment secrets are not configured."
            echo "### Cloudflare deployment skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "Release checks passed, but CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID are not configured." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Deploy Worker and Pages
        if: env.DEPLOY_ENABLED == 'true'
        run: |
          for attempt in 1 2 3; do
            npm run deploy:worker && break
            [ "$attempt" -eq 3 ] && exit 1
            sleep $((attempt * 10))
          done
          for attempt in 1 2 3; do
            npm run deploy:pages && break
            [ "$attempt" -eq 3 ] && exit 1
            sleep $((attempt * 10))
          done
