name: Deploy WLOC to Cloudflare

on:
  workflow_dispatch:

concurrency:
  group: wloc-cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Cloudflare assets
        run: npm run pages:prepare

      - name: Security checks
        run: npm test && npm run audit:links

      - name: Deploy Worker and Pages
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CF_API_TOKEN" ]; then
            export CLOUDFLARE_API_TOKEN="$CF_API_TOKEN"
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && [ -n "$CF_ACCOUNT_ID" ]; then
            export CLOUDFLARE_ACCOUNT_ID="$CF_ACCOUNT_ID"
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN or CF_API_TOKEN repository secret is required." >&2
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "CLOUDFLARE_ACCOUNT_ID or CF_ACCOUNT_ID repository secret is required." >&2
            exit 1
          fi
          for attempt in 1 2 3; do
            if npx --yes wrangler@4.110.0 deploy --minify --config=wrangler.worker.jsonc && npx --yes wrangler@4.110.0 pages deploy dist --project-name=wloc-time-capsule --branch=main --commit-dirty=true; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
